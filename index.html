<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Big things are coming</title>
  <meta name="description" content="Er komt iets nieuws aan. Stay tuned.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
      display: grid;
      place-items: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }
    .glow {
      position: absolute;
      width: 60vmax;
      height: 60vmax;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .glow.one {
      background: radial-gradient(circle, #ff6a00 0%, transparent 70%);
      top: -20vmax;
      left: -20vmax;
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .glow.two {
      background: radial-gradient(circle, #ffd166 0%, transparent 70%);
      bottom: -25vmax;
      right: -20vmax;
      animation: drift2 22s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(8vmax, 6vmax); } }
    @keyframes drift2 { to { transform: translate(-6vmax, -8vmax); } }
    main {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 720px;
    }
    .eyebrow {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #ffd166;
      margin-bottom: 2rem;
      animation: fade 1.2s ease 0.1s both;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: clamp(3rem, 9vw, 6.5rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      animation: fade 1.2s ease 0.3s both;
    }
    h1 em {
      font-style: italic;
      color: #ffd166;
    }
    p {
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.6;
      color: #b8b8b8;
      max-width: 520px;
      margin: 0 auto 2.5rem;
      animation: fade 1.2s ease 0.5s both;
    }
    .signature {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #6b6b6b;
      animation: fade 1.2s ease 0.7s both;
    }
    .signature a {
      color: #f5f5f5;
      text-decoration: none;
      border-bottom: 1px solid #333;
      transition: border-color 0.2s;
    }
    .signature a:hover { border-color: #ffd166; }
    @keyframes fade {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="glow one"></div>
  <div class="glow two"></div>
  <main>
    <div class="eyebrow">Coming Soon</div>
    <h1>Big things <em>are coming</em></h1>
    <p>Er staat iets nieuws op stapel. We werken achter de schermen aan iets bijzonders. Houd ons in de gaten.</p>
    <div class="signature">A new chapter — by <a href="https://www.studiolee.nl" target="_blank" rel="noopener">StudioLee</a></div>
  </main>
</body>
</html>

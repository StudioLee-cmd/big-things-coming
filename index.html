<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Big things are coming</title>
  <meta name="description" content="Er komt iets nieuws aan. Stay tuned.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #f5f1e8;
      color: #14110d;
      position: relative;
      overflow-x: hidden;
    }
    .hero {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      position: relative;
    }
    .glow {
      position: absolute;
      width: 60vmax;
      height: 60vmax;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
    }
    .glow.one {
      background: radial-gradient(circle, #ffd7b8 0%, transparent 70%);
      top: -20vmax;
      left: -20vmax;
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .glow.two {
      background: radial-gradient(circle, #e8dcc4 0%, transparent 70%);
      bottom: -25vmax;
      right: -20vmax;
      animation: drift2 22s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(8vmax, 6vmax); } }
    @keyframes drift2 { to { transform: translate(-6vmax, -8vmax); } }
    main {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 720px;
    }
    .eyebrow {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #c84e1a;
      margin-bottom: 2rem;
      animation: fade 1.2s ease 0.1s both;
    }
    h1 {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: clamp(3rem, 9vw, 6.5rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      animation: fade 1.2s ease 0.3s both;
    }
    h1 em {
      font-style: italic;
      color: #c84e1a;
    }
    p {
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.6;
      color: #6b6358;
      max-width: 520px;
      margin: 0 auto 2.5rem;
      animation: fade 1.2s ease 0.5s both;
    }
    .signature {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #8a8275;
      animation: fade 1.2s ease 0.7s both;
    }
    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #b5ac9c;
      animation: fade 1.2s ease 1.1s both, bob 2.5s ease-in-out infinite;
    }
    .footer-strip {
      position: relative;
      z-index: 1;
      padding: 3rem 2rem;
      text-align: center;
      border-top: 1px solid rgba(20,17,13,0.06);
    }
    .footer-strip a {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #b5ac9c;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-strip a:hover { color: #14110d; }
    @keyframes fade {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bob {
      0%, 100% { transform: translate(-50%, 0); }
      50%      { transform: translate(-50%, -6px); }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="glow one"></div>
    <div class="glow two"></div>
    <main>
      <div class="eyebrow">Coming Soon</div>
      <h1>Big things <em>are coming</em></h1>
      <p>Er staat iets nieuws op stapel. We werken achter de schermen aan iets bijzonders. Houd ons in de gaten.</p>
      <div class="signature">A new chapter</div>
    </main>
    <div class="scroll-hint">scroll</div>
  </section>
  <footer class="footer-strip">
    <a href="/legal">Bedrijfsgegevens</a>
  </footer>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
